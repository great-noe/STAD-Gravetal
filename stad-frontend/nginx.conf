server {
    listen 80;
    server_name localhost;

    # Directorio raiz donde Nginx busca los archivos estaticos
    root /usr/share/nginx/html;
    index index.html;

    # Compresion gzip para reducir el tamanio de la respuesta
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Punto de entrada para la SPA de Angular.
    # Si el archivo o directorio no existe, redirige a index.html
    # para que Angular Router maneje la ruta en el cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets con hash (Angular genera nombres como main.abc123.js)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
